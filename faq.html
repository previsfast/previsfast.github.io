<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAQ — PrevisFast</title>
<style>
  :root {
    --blu: #1a237e;
    --blu-chiaro: #283593;
    --gold: #f9a825;
    --grigio: #616161;
    --grigio-chiaro: #f5f5f5;
    --bordo: #e0e0e0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: #f5f5f5;
    color: #212121;
    padding: 24px 16px;
  }

  .container {
    max-width: 720px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo {
    font-size: 26px;
    font-weight: 700;
    color: var(--blu);
    letter-spacing: -0.5px;
    margin-bottom: 8px;
  }
  .logo span { color: var(--gold); }

  .divider {
    height: 2px;
    background: linear-gradient(to right, var(--blu), var(--blu-chiaro));
    border-radius: 2px;
    margin: 12px auto 16px;
    max-width: 200px;
  }

  header p {
    font-size: 14px;
    color: var(--grigio);
  }

  .lang-switcher {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 28px;
  }

  .lang-btn {
    padding: 6px 18px;
    border-radius: 20px;
    border: 2px solid var(--blu);
    background: white;
    color: var(--blu);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .lang-btn.active {
    background: var(--blu);
    color: white;
  }

  .section-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--blu);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin: 28px 0 10px;
    padding-left: 4px;
  }

  .faq-item {
    background: white;
    border-radius: 12px;
    margin-bottom: 8px;
    border: 1px solid var(--bordo);
    overflow: hidden;
  }

  .faq-question {
    width: 100%;
    text-align: left;
    padding: 16px 20px;
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    font-size: 14px;
    font-weight: 600;
    color: #212121;
    line-height: 1.4;
  }

  .faq-question:hover { background: var(--grigio-chiaro); }

  .faq-icon {
    font-size: 18px;
    color: var(--blu);
    flex-shrink: 0;
    transition: transform 0.2s;
  }

  .faq-item.open .faq-icon { transform: rotate(45deg); }

  .faq-answer {
    display: none;
    padding: 0 20px 16px;
    font-size: 13px;
    color: var(--grigio);
    line-height: 1.7;
    border-top: 1px solid var(--bordo);
  }

  .faq-item.open .faq-answer { display: block; }

  .faq-answer p { margin-bottom: 8px; }
  .faq-answer p:last-child { margin-bottom: 0; }
  .faq-answer ul { margin: 8px 0 8px 18px; }
  .faq-answer ul li { margin-bottom: 4px; }
  .faq-answer strong { color: #212121; }
  .faq-answer .warning {
    background: #fff8e1;
    border: 1px solid #f9a825;
    border-radius: 8px;
    padding: 10px 14px;
    margin-top: 10px;
    font-size: 12px;
    color: #e65100;
  }
  .faq-answer .info {
    background: #e8eaf6;
    border: 1px solid #9fa8da;
    border-radius: 8px;
    padding: 10px 14px;
    margin-top: 10px;
    font-size: 12px;
    color: var(--blu);
  }

  footer {
    margin-top: 40px;
    text-align: center;
    font-size: 11px;
    color: #bdbdbd;
    padding-bottom: 24px;
  }
  footer a { color: #bdbdbd; }
</style>
</head>
<body>

  </div>

  <div id="faq-content"></div>

  <footer>
    <a href="https://previsfast.it/privacy" target="_blank">Privacy Policy</a>
    &nbsp;·&nbsp;
    <a href="mailto:privacy@previsfast.it">Supporto</a>
    &nbsp;·&nbsp; PrevisFast © 2026
  </footer>

</div>

let currentLang = 'it';

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.lang-btn')[lang === 'it' ? 0 : 1].classList.add('active');
  document.getElementById('header-sub').textContent = faq[lang].headerSub;
  renderFaq(lang);
}

function renderFaq(lang) {
  const data = faq[lang];
  const container = document.getElementById('faq-content');
  container.innerHTML = '';

  data.sections.forEach(section => {
    const titleEl = document.createElement('div');
    titleEl.className = 'section-title';
    titleEl.textContent = section.title;
    container.appendChild(titleEl);

    section.items.forEach((item) => {
      const div = document.createElement('div');
      div.className = 'faq-item';

      const btn = document.createElement('button');
      btn.className = 'faq-question';
      btn.innerHTML = `<span>${item.q}</span><span class="faq-icon">+</span>`;
      btn.onclick = () => div.classList.toggle('open');

      const answer = document.createElement('div');
      answer.className = 'faq-answer';
      answer.innerHTML = item.a;

      div.appendChild(btn);
      div.appendChild(answer);
      container.appendChild(div);
    });
  });
}

const urlLang = new URLSearchParams(window.location.search).get('lang');
if (urlLang === 'en') setLang('en');
else renderFaq('it');
